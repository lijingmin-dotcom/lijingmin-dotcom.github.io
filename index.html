<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESIGN WORKS | 李静敏设计集</title>
    <style>
        /* --- 基础重置与暖系包豪斯变量 --- */
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;}

        :root {
            --bg-canvas: #F4F1EB;     /* 核心：极具材质温度的浅陶黏土色 */
            --bg-sidebar: #FAF9F6;    /* 核心：温润素胚宣纸白 */
            --text-dark: #2A2622;     /* 核心：深烟熏炭黑（告别纯黑死板） */
            --text-muted: #8A7E73;    /* 枯木缝隙灰 */
            --line-solid: #2A2622;    /* 结构实体线 */
            --line-light: #E5E1D8;    /* 细腻的泥土色测绘线 */
            --line-grid: rgba(42, 38, 34, 0.035); /* 隐约的大地交错网格 */
        }

        body{
            background: var(--bg-canvas);
            /* 精密大地色建筑网格底 */
            background-image: 
                linear-gradient(to right, var(--line-grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--line-grid) 1px, transparent 1px);
            background-size: 60px 60px; 
            font-family: "PingFang SC", "-apple-system", sans-serif;
            color: var(--text-dark);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* --- 移动端汉堡按钮 --- */
        .menu-btn{
            position: fixed;
            top: 25px;
            right: 25px;
            width: 44px;
            height: 44px;
            background: var(--bg-sidebar);
            border: 1px solid var(--text-dark);
            border-radius: 0; 
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--text-dark);
            z-index: 9999;
            cursor: pointer;
        }

        /* --- 左侧直角宣纸侧边栏 --- */
        .sidebar{
            position: fixed;
            top: 0; left: 0; width: 280px; height: 100vh;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--line-light);
            padding: 80px 40px;
            z-index: 999;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        /* 双轨结构线装饰 */
        .sidebar::after {
            content: ''; position: absolute; top: 0; right: 5px; width: 1px; height: 100%;
            background: var(--line-grid);
        }
        .sidebar .logo{
            font-family: "Noto Serif SC", "Georgia", serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: 5px;
            margin-bottom: 80px;
            text-align: center;
            text-transform: uppercase;
        }
        .nav{ display: flex; flex-direction: column; gap: 4px; }
        .nav a{
            padding: 14px 20px;
            text-decoration: none;
            color: var(--text-muted);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 13px;
            text-align: left;
            letter-spacing: 3px;
            font-weight: 500;
            position: relative;
        }
        .nav a:hover{ color: var(--text-dark); padding-left: 26px; }
        .nav a.active{ color: var(--text-dark); font-weight: 700; background: var(--bg-canvas); }
        .nav a.active::before {
            content: ''; position: absolute; left: 0; top: 0; width: 2px; height: 100%;
            background: var(--line-solid);
        }

        /* --- 右侧内容观展区 --- */
        .content{ margin-left: 280px; padding: 100px 60px; min-height: 100vh; }
        
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 120px; 
        }
        .reveal.reveal-active { opacity: 1; transform: translateY(0); }

        /* 高级工字标尺线标题 */
        .section-title{
            font-family: "Noto Serif SC", "Source Han Serif CN", serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 45px;
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .section-title::before { content: '┠'; font-family: monospace; color: var(--text-dark); font-weight: normal; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--line-solid); }

        /* --- 动态视频板块（R2播放器样式优化） --- */
        .video-show{ margin-bottom:30px; }
        .video-main{
            width:100%;
            height:500px;
            overflow:hidden;
            margin-bottom:25px;
            background: #000;
            border: 1px solid var(--text-dark);
        }
        .video-main video{ width:100%; height:100%; object-fit: contain; }
        .video-thumbs{ display: flex; gap: 8px; flex-wrap: wrap; }
        .video-thumb{
            padding: 10px 24px;
            background: var(--bg-sidebar);
            border: 1px solid var(--line-light);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .video-thumb:hover { border-color: var(--text-dark); color: var(--text-dark); }
        .video-thumb.active{ background: var(--text-dark); color: var(--bg-sidebar); border-color: var(--text-dark); }


        /* ==========================================================================
           【重构核心】大图叙事线构矩阵：黄金3列 ＋ 纵向吊线 ＋ L型直角标
           ========================================================================== */
        
        /* 标尺切换导轨 */
        .filter-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 45px;
            border-top: 1px solid var(--text-dark);
            border-bottom: 1px dashed var(--line-light);
            padding: 15px 0;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: transparent;
            border: 1px dashed var(--line-light);
            padding: 8px 22px;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .filter-btn:hover { border-color: var(--text-dark); color: var(--text-dark); }
        .filter-btn.active { background: var(--text-dark); color: var(--bg-sidebar); border-color: var(--text-dark); }

        /* 升级为舒展、大气的 3 列布局，给画面绝对的聚焦深度 */
        .gallery { 
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 65px 45px; /* 极宽的间距，形成纸张的呼吸盲区 */
            position: relative;
            
            /* 背景物理线强化：注入3条穿透卡片的纵向艺术挂轴吊线 */
            background-image: 
                linear-gradient(to right, var(--line-light) 1px, transparent 1px),
                linear-gradient(to right, var(--line-light) 1px, transparent 1px),
                linear-gradient(to right, var(--line-light) 1px, transparent 1px);
            background-position: 16.66% 0, 50% 0, 83.33% 0; /* 穿透三列正中心 */
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }
        
        .card {
            display: block; 
            width: 100%;
            aspect-ratio: 3 / 4.1;  /* 艺术画册标准纵向画幅 */
            position: relative;
            cursor: pointer;
            padding: 0;
            background: none;
            border: none;
            box-shadow: none;
        }
        
        .card.hide { display: none !important; }

        /* 角落极细的刚性 L 型物理对焦标 */
        .card::before, .card::after {
            content: ''; position: absolute; width: 12px; height: 12px;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0.35; pointer-events: none;
            z-index: 3;
        }
        .card::before { top: -6px; left: -6px; border-top: 1px solid var(--text-dark); border-left: 1px solid var(--text-dark); }
        .card::after { bottom: -6px; right: -6px; border-bottom: 1px solid var(--text-dark); border-right: 1px solid var(--text-dark); }

        .card-inner {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            position: relative;
            background: var(--bg-sidebar); /* 垫底暖卡纸白 */
            border: 1px solid var(--line-light);
            padding: 10px;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 100% 完整原图，绝不裁剪 */
            filter: grayscale(6%) sepia(3%) contrast(97%);
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card img.loaded { opacity: 1; }

        /* 高级动态交互：从“导轨”上垂直拔出悬空，拉开落差微阴影 */
        .card:hover .card-inner { 
            border-color: var(--text-dark); 
            transform: translateY(-8px); /* 向上抬升 */
            box-shadow: 0 25px 50px rgba(42, 38, 34, 0.07); 
        }
        /* 四角 L 型对焦轨线向外呈放射状扩充，机械细节拉满 */
        .card:hover::before { top: -12px; left: -12px; opacity: 1; }
        .card:hover::after { bottom: -12px; right: -12px; opacity: 1; }
        .card:hover img { transform: scale(1.02); filter: grayscale(0%) sepia(0%) contrast(100%); }

        /* 追加加载按钮 */
        .load-container { display: flex; justify-content: center; margin-top: 60px; }
        .load-more-btn {
            background: transparent;
            border: 1px solid var(--text-dark);
            padding: 14px 45px;
            font-size: 11px;
            letter-spacing: 4px;
            font-weight: 700;
            color: var(--text-dark);
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .load-more-btn:hover { background: var(--text-dark); color: var(--bg-sidebar); }

        /* --- 磨砂玻璃放大弹窗 --- */
        .img-popup{
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(42, 38, 34, 0.92); 
            backdrop-filter: blur(12px);
            z-index: 99999;
            display: flex; align-items: center; justify-content: center; padding: 40px;
            opacity: 0; visibility: hidden;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: zoom-out;
        }
        .img-popup img{
            max-width: 92%; max-height: 92%; object-fit: contain;
            border-radius: 0; 
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 70px rgba(0,0,0,0.3);
            transform: scale(0.95);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .img-popup.active{ opacity: 1; visibility: visible; }
        .img-popup.active img { transform: scale(1); }

        /* 底栏 */
        .footer{ 
            text-align:center; padding:100px 0 40px; color:var(--text-muted); font-size:11px; letter-spacing: 3px;
            border-top: 1px dashed var(--text-dark);
            text-transform: uppercase;
        }

        /* --- 响应式布局自动分栏降维 --- */
        @media (max-width:1300px){ 
            .gallery { grid-template-columns: repeat(2, 1fr); background-image: none; } 
        }
        @media (max-width:1100px){
            .sidebar{ width: 240px; padding: 40px 20px; }
            .content{ margin-left: 240px; padding: 80px 30px; }
        }
        @media (max-width:768px){
            .menu-btn{ display:flex; }
            .sidebar{ transform: translateX(-100%); width: 260px; box-shadow: 15px 0 40px rgba(42,38,34,0.04); }
            .sidebar.show{ transform: translateX(0); }
            .content{ margin-left: 0; padding: 100px 20px 40px; }
            .video-main{ height:260px; }
            .reveal { margin-bottom: 80px; }
            .gallery { grid-template-columns: 1fr; gap: 40px; }
        }
    </style>
</head>

    <script>
        // 1. 移动端菜单逻辑
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const navLinks = document.querySelectorAll('.nav a');

        menuBtn.addEventListener('click', (e) => {
            sidebar.classList.toggle('show');
            e.stopPropagation();
        });
        document.addEventListener('click', () => sidebar.classList.remove('show'));
        navLinks.forEach(link => {
            link.addEventListener('click', () => sidebar.classList.remove('show'));
        });

        // 2. 原生流媒体大视频硬件加速切换调度
        const thumbs = document.querySelectorAll('.video-thumb');
        const mainVideo = document.getElementById('mainVideo');
        thumbs.forEach(thumb => {
            thumb.addEventListener('click', () => {
                thumbs.forEach(t => t.classList.remove('active'));
                thumb.classList.add('active');
                
                mainVideo.src = thumb.dataset.src;
                mainVideo.load();
                mainVideo.play();
            });
        });

        // 3. 弹窗放大
        const popup = document.getElementById('imgPopup');
        const bigImg = document.getElementById('bigImg');
        
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', (e) => {
                const img = card.querySelector('img');
                if(img) {
                    bigImg.src = img.src;
                    popup.classList.add('active');
                    document.body.style.overflow = 'hidden';
                    e.stopPropagation();
                }
            });
        });
        popup.addEventListener('click', () => {
            popup.classList.remove('active');
            document.body.style.overflow = '';
        });

        // 4. 高性能分批流控 ＋ 分类检索
        const filterBtns = document.querySelectorAll('.filter-menu .filter-btn');
        const galleryCards = document.querySelectorAll('#galleryGrid .card');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const loadContainer = document.getElementById('loadContainer');
        
        let initialLimit = 12; 
        let currentFilter = 'all';

        function renderGallery() {
            let visibleIndex = 0; 

            galleryCards.forEach(card => {
                const matchesCategory = currentFilter === 'all' || card.dataset.cat === currentFilter;
                
                if (matchesCategory) {
                    if (currentFilter === 'all') {
                        if (visibleIndex < initialLimit) {
                            card.classList.remove('hide');
                            visibleIndex++;
                        } else {
                            card.classList.add('hide');
                        }
                    } else {
                        card.classList.remove('hide');
                        visibleIndex++;
                    }
                } else {
                    card.classList.add('hide');
                }
            });

            if (currentFilter === 'all' && initialLimit < galleryCards.length) {
                loadContainer.style.display = 'flex';
            } else {
                loadContainer.style.display = 'none';
            }
        }

        loadMoreBtn.addEventListener('click', () => {
            initialLimit += 12; 
            renderGallery();
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                currentFilter = btn.dataset.target;
                if (currentFilter === 'all') {
                    initialLimit = 12; 
                }
                renderGallery();
            });
        });

        renderGallery();

        // 渐进式渲染
        const allImgs = document.querySelectorAll('#galleryGrid img');
        allImgs.forEach(img => {
            if (img.complete) {
                img.classList.add('loaded');
            } else {
                img.onload = () => img.classList.add('loaded');
            }
        });

        // ==========================================================================
        // 5. 智能监控 (Scrollspy) + 升级版触底自动激活“关于我”高亮
        // ==========================================================================
        const reveals = document.querySelectorAll('.reveal');

        const globalObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal-active');
                    const id = entry.target.getAttribute('id');
                    updateNav(id);
                }
            });
        }, { root: null, rootMargin: '-20% 0px -40% 0px', threshold: 0.05 });

        reveals.forEach(el => globalObserver.observe(el));

        // 抽离统一高亮调度函数
        function updateNav(id) {
            navLinks.forEach(link => {
                if (link.getAttribute('href') === `#${id}`) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }

        // 核心修正：实时监听整个窗口，一旦物理触底，强行激活最后一项“关于我”
        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 50) {
                updateNav('about');
            }
        });
    </script>
</body>
</html>
