<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESIGN WORKS | 侘寂风设计作品集</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;}

        /* 侘寂风主色调 */
        :root {
            --wabi-bg: #F7F5F2;
            --wabi-text: #4A443E;
            --wabi-light: #E5E1DB;
            --wabi-accent: #9A8F84;
            --wabi-dark: #2C2823;
        }

        body{
            background: var(--wabi-bg);
            font-family: "PingFang SC","Microsoft YaHei",sans-serif;
            color: var(--wabi-text);
            line-height: 1.7;
        }

        /* 移动端汉堡按钮 */
        .menu-btn{
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 9999;
            cursor: pointer;
            border: none;
            display: none;
        }

        /* 左侧固定导航栏 */
        .sidebar{
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: #fff;
            border-right: 1px solid var(--wabi-light);
            padding: 50px 30px;
            z-index: 999;
            transition: all 0.3s ease;
        }
        .sidebar .logo{
            font-size: 22px;
            font-weight: 500;
            color: var(--wabi-dark);
            letter-spacing: 2px;
            margin-bottom: 50px;
            text-align: center;
        }
        .nav{
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .nav a{
            padding: 14px 20px;
            text-decoration: none;
            color: var(--wabi-text);
            border-radius: 10px;
            transition: all 0.25s ease;
            font-size: 15px;
            text-align: center;
        }
        .nav a:hover{
            background: var(--wabi-bg);
            color: var(--wabi-dark);
        }
        .nav a.active{
            background: var(--wabi-accent);
            color: #fff;
        }

        /* 右侧内容区 */
        .content{
            margin-left: 260px;
            padding: 60px 50px;
            min-height: 100vh;
        }
        .section{
            margin-bottom: 100px;
        }
        .section-title{
            font-size: 26px;
            font-weight: 500;
            color: var(--wabi-dark);
            margin-bottom: 40px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--wabi-light);
        }

        /* 视频区域 */
        .video-show{margin-bottom:30px;}
        .video-main{
            width:100%;
            height:480px;
            border-radius:16px;
            overflow:hidden;
            box-shadow:0 8px 25px rgba(0,0,0,0.06);
            margin-bottom:20px;
        }
        .video-main iframe{
            width:100%;
            height:100%;
            border:none;
        }
        .video-thumbs{
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
            gap:18px;
        }
        .video-thumb{
            height:160px;
            border-radius:10px;
            overflow:hidden;
            cursor:pointer;
            opacity:0.8;
            transition:all 0.3s ease;
        }
        .video-thumb.active{opacity:1;}
        .video-thumb:hover{
            opacity:1;
            transform:translateY(-4px);
        }
        .video-thumb iframe{
            width:100%;
            height:100%;
            border:none;
            pointer-events:none;
        }

        /* 图片画廊 侘寂风卡片 */
        .gallery{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
            gap:28px;
        }
        .card{
            height:330px;
            background:#ffffff;
            border-radius:16px;
            padding:20px;
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:0 6px 20px rgba(0,0,0,0.05);
            transition:all 0.4s ease;
            cursor: pointer;
            border: 1px solid var(--wabi-light);
        }
        .card img{
            max-width:100%;
            max-height:100%;
            object-fit:contain;
            border-radius:6px;
            transition:all 0.3s ease;
        }
        .card:hover{
            transform:translateY(-10px);
            box-shadow:0 15px 35px rgba(0,0,0,0.08);
        }
        .card:hover img{
            transform:scale(1.03);
        }

        /* 图片放大弹窗 */
        .img-popup{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .img-popup img{
            max-width: 92%;
            max-height: 92%;
            object-fit: contain;
            border-radius: 8px;
        }
        .img-popup.active{
            display: flex;
        }

        .footer{
            text-align:center;
            padding:40px 0;
            color:var(--wabi-accent);
            font-size:14px;
        }

        /* 响应式：手机端 */
        @media (max-width:900px){
            .menu-btn{display:flex;}
            .sidebar{
                left: -260px;
                box-shadow: 5px 0 20px rgba(0,0,0,0.1);
            }
            .sidebar.show{
                left: 0;
            }
            .content{
                margin-left: 0;
                padding: 30px 20px;
            }
            .video-main{height:300px;}
        }
    </style>
</head>

<body>
    <!-- 汉堡菜单按钮 -->

        <div class="logo">DESIGN</div>
        <div class="nav">

                    <div class="video-thumb" data-src="//player.bilibili.com/player.html?isOutside=true&aid=116594084745275&bvid=BV1rBLF63EVK&cid=38419039962&p=1">

        <!-- 关于我 -->
        <section class="section" id="about">
            <h2 class="section-title">关于我</h2>
            <p style="font-size:16px; color:var(--wabi-text); max-width:700px;">
                专注视觉设计、平面海报、动态视频创作，坚持侘寂美学理念，简约、自然、有质感，用心创作每一份作品。
            </p>
        </section>

        <div class="footer">
            © 侘寂风设计作品集 · 原创视觉
        </div>
    </div>

    <!-- 图片放大弹窗 -->
    <div class="img-popup" id="imgPopup">
        <img src="" id="bigImg">
    </div>

    <script>
        // 侧边栏菜单切换
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('show');
        });

        // 视频切换
        const thumbs = document.querySelectorAll('.video-thumb');
        const mainVideo = document.getElementById('mainVideo');
        thumbs.forEach(thumb => {
            thumb.addEventListener('click', () => {
                thumbs.forEach(t => t.classList.remove('active'));
                thumb.classList.add('active');
                mainVideo.src = thumb.dataset.src;
            });
        });

        // 图片点击放大
        const cards = document.querySelectorAll('.card img');
        const popup = document.getElementById('imgPopup');
        const bigImg = document.getElementById('bigImg');
        cards.forEach(img => {
            img.addEventListener('click', () => {
                bigImg.src = img.src;
                popup.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
        });
        popup.addEventListener('click', () => {
            popup.classList.remove('active');
            document.body.style.overflow = '';
        });
    </script>

</html>
