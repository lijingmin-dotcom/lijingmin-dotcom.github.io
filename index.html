<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原创设计作品集 | 视觉设计</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background-color: #f8f9fa;
            font-family: "PingFang SC",Microsoft YaHei,sans-serif;
            color: #222;
            line-height: 1.6;
        }
        .container{
            max-width: 1320px;
            margin: 0 auto;
            padding: 0 20px;
        }
        /* 头部轻奢设计 */
        .header{
            text-align: center;
            padding: 60px 0 40px;
            border-bottom: 1px solid #e5e7eb;
            margin-bottom: 50px;
        }
        .header h1{
            font-size: 36px;
            font-weight: 500;
            letter-spacing: 4px;
            color: #1a1a1a;
            margin-bottom: 12px;
        }
        .header p{
            font-size: 16px;
            color: #6b7280;
            letter-spacing: 1px;
        }
        /* 栏目标题 */
        .title-line{
            font-size: 22px;
            font-weight: 500;
            padding-left: 16px;
            border-left: 3px solid #2563eb;
            margin: 60px 0 30px;
            color: #1f2937;
        }
        /* 视频区域样式 */
        .video-box{
            display: grid;
            gap: 35px;
        }
        .video-box iframe{
            width: 100%;
            height: 420px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        .video-box iframe:hover{
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.12);
        }
        /* 海报核心排版 不裁剪 不变形 整齐洋气 */
        .design-gallery{
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 28px;
            margin-bottom: 80px;
        }
        .design-card{
            background: #ffffff;
            padding: 15px;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
            transition: all 0.35s ease;
        }
        .design-card:hover{
            transform: translateY(-8px);
            box-shadow: 0 16px 36px rgba(0,0,0,0.1);
        }
        .design-card img{
            width: 100%;
            height: auto;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            display: block;
        }
        /* 底部简约页脚 */
        .footer{
            text-align: center;
            padding: 50px 0;
            color: #9ca3af;
            font-size: 15px;
            border-top: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部主页 -->
        <div class="header">
            <h1>DESIGN WORKS</h1>
            <p>动画创意 · 政务宣传 · 平面视觉 · 原创海报设计</p>
        </div>

        <!-- 视频作品区 -->
        <h2 class="title-line">动态视频作品</h2>
        <div class="video-box">
            <iframe src="//player.bilibili.com/player.html?isOutside=true&aid=116594084681794&bvid=BV1nBLF63EKB&cid=38419038865&p=1" allowfullscreen></iframe>
            <iframe src="//player.bilibili.com/player.html?isOutside=true&aid=116594084745275&bvid=BV1rBLF63EVK&cid=38419039962&p=1" allowfullscreen></iframe>
            <iframe src="//player.bilibili.com/player.html?isOutside=true&aid=116594135014244&bvid=BV1euLF6cEff&cid=38419171789&p=1" allowfullscreen></iframe>
        </div>

        <!-- 海报作品区 完整保留原图 不裁剪 -->
        <h2 class="title-line">平面海报作品集</h2>
        <div class="design-gallery">
