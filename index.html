<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人作品集</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f5f5;font-family:微软雅黑;}
        .box{max-width:1200px;margin:0 auto;padding:20px;}
        .head{text-align:center;padding:40px 0;}
        .head h1{font-size:30px;color:#222;}
        .head p{color:#666;margin-top:10px;}
        .line{font-size:22px;margin:40px 0 20px;border-left:4px solid #333;padding-left:15px;}
        .pic{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;}
        .pic img{width:100%;border-radius:6px;box-shadow:0 2px 8px #ccc;}
        .video{display:grid;grid-template-columns:1fr;gap:30px;margin:20px 0;}
        .video iframe{width:100%;height:360px;border-radius:8px;}
        .foot{text-align:center;margin-top:60px;padding:30px;color:#999;}
    </style>
</head>
<body>
    <div class="box">
        <div class="head">
            <h1>我的设计作品集</h1>
            <p>动画设计 | 宣传短片 | 平面海报</p>
        </div>

        <h2 class="line">视频作品</h2>
        <div class="video">
            <iframe src="//player.bilibili.com/player.html?isOutside=true&aid=116594084681794&bvid=BV1nBLF63EKB&cid=38419038865&p=1" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>

            <iframe src="//player.bilibili.com/player.html?isOutside=true&aid=116594084745275&bvid=BV1rBLF63EVK&cid=38419039962&p=1" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>

            <iframe src="//player.bilibili.com/player.html?isOutside=true&aid=116594135014244&bvid=BV1euLF6cEff&cid=38419171789&p=1" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>
        </div>

        <h2 class="line">海报作品</h2>
        <div class="pic">
            <img src="img/1.jpg">
            <img src="img/2.jpg">
            <img src="img/3.jpg">
        </div>

        <h2 class="line">关于我</h2>
        <p>擅长MG动画、政务宣传视频、平面视觉设计，用心做好每一份作品。</p>

        <div class="foot">
            个人免费作品集网站
        </div>
    </div>
</body>
</html>
