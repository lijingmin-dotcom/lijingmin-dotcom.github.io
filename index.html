<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计作品集 | 清蓝视觉美学</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior: smooth;}
        body{
            background-color: #F3F7FA;
            font-family: "PingFang SC",微软雅黑,sans-serif;
            color: #4A5568;
            opacity: 0;
            animation: bodyFade 1s ease forwards;
        }
        @keyframes bodyFade{
            to{opacity: 1;}
        }
        .wrap{
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 25px;
        }
        /* 头部渐变光影 */
        .top-head{
            text-align: center;
            padding: 70px 0 50px;
            border-bottom: 1px solid #D9E4EE;
            position: relative;
            overflow: hidden;
        }
        .top-head::after{
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,transparent,rgba(148,179,210,0.15),transparent);
            animation: headLight 4s infinite linear;
        }
        @keyframes headLight{
            100%{left: 100%;}
        }
        .top-head h1{
            font-size: 38px;
            color: #546E90;
            letter-spacing: 6px;
            font-weight: 500;
            margin-bottom: 15px;
            text-shadow: 0 2px 8px rgba(84,110,144,0.15);
        }
        .top-head p{
            font-size: 17px;
            color: #718096;
            letter-spacing: 2px;
        }
        /* 栏目标题流光 */
        .section-title{
            font-size: 23px;
            color: #546E90;
            margin: 65px 0 32px;
            padding-left: 18px;
            border-left: 4px solid #94B3D2;
            transition: all 0.3s;
        }
        .section-title:hover{
            border-left-color: #546E90;
            padding-left: 25px;
        }
        /* 视频炫酷效果 */
        .video-list{
            display: grid;
            gap: 38px;
        }
        .video-list iframe{
            width: 100%;
            height: 410px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(116,147,179,0.12);
            transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .video-list iframe:hover{
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 15px 40px rgba(116,147,179,0.25);
        }
        /* 作品卡片 炫酷3D倾斜+流光 */
        .gallery{
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
            gap: 30px;
            margin-bottom: 90px;
        }
        .work-card{
            background: #ffffff;
            padding: 16px;
            border-radius: 18px;
            box-shadow: 0 5px 15px rgba(100,130,160,0.08);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        /* 卡片流光扫过 */
        .work-card::before{
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,transparent,rgba(148,179,210,0.2),transparent);
            transition: left 0.6s ease;
        }
        .work-card:hover::before{
            left: 100%;
        }
        .work-card:hover{
            transform: translateY(-10px) rotateX(3deg);
            box-shadow: 0 20px 45px rgba(100,130,160,0.18);
        }
        .work-card img{
            width: 100%;
            max-height: 310px;
            object-fit: contain;
            border-radius: 10px;
            display: block;
            transition: transform 0.3s ease;
        }
        .work-card:hover img{
            transform: scale(1.03);
        }
        /* 页脚呼吸渐变 */
        .footer{
            text-align: center;
            padding: 55px 0;
            color: #8798B0;
            font-size: 15px;
            border-top: 1px solid #D9E4EE;
            animation: breathe 5s infinite ease-in-out;
        }
        @keyframes breathe{
            0%,100%{opacity:0.8;}
            50%{opacity:1;}
        }
    </style>
</head>
