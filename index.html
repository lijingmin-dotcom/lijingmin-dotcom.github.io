<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESIGN WORKS | 李静敏设计集</title>
    <style>
        /* --- 基础重置与包豪斯几何变量 --- */
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;}

        :root {
            --bg-canvas: #F5F5F3;     /* 艺术纸冷白 / 浅冷灰 */
            --bg-sidebar: #FFFFFF;    /* 纯白结构板块 */
            --text-dark: #111111;     /* 曜石纯黑 */
            --text-muted: #7E8185;    /* 工业冷灰 */
            --line-grid: rgba(17, 17, 17, 0.035);  /* 超级微弱的背景网格线 */
            --line-solid: #111111;    /* 强烈的结构实体线 */
            --line-light: #E0E2E5;    /* 测绘辅助线灰 */
        }

        body{
            background: var(--bg-canvas);
            /* 【特效一：建筑测绘微网格背景】 */
            background-image: 
                linear-gradient(to right, var(--line-grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--line-grid) 1px, transparent 1px);
            background-size: 80px 80px; /* 80px 精密几何方格 */
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", sans-serif;
            color: var(--text-dark);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* --- 移动端汉堡按钮（纯几何线条化） --- */
        .menu-btn{
            position: fixed;
            top: 25px;
            right: 25px;
            width: 44px;
            height: 44px;
            background: var(--bg-sidebar);
            border: 1px solid var(--text-dark);
            border-radius: 0; /* 彻底干掉圆角，采用凌厉的直角几何 */
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--text-dark);
            z-index: 9999;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .menu-btn:hover { background: var(--text-dark); color: #fff; }

        /* --- 左侧侧边栏（几何悬浮块） --- */
        .sidebar{
            position: fixed;
            top: 0; left: 0; width: 280px; height: 100vh;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--line-light);
            padding: 80px 40px;
            z-index: 999;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        /* 侧边栏装饰几何线条 */
        .sidebar::after {
            content: ''; position: absolute; top: 0; right: 9px; width: 1px; height: 100%;
            background: var(--line-grid);
        }
        .sidebar .logo{
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: 5px;
            margin-bottom: 80px;
            text-align: center;
            text-transform: uppercase;
        }
        .nav{ display: flex; flex-direction: column; gap: 4px; }
        .nav a{
            padding: 14px 20px;
            text-decoration: none;
            color: var(--text-muted);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 13px;
            text-align: left;
            letter-spacing: 3px;
            font-weight: 500;
            position: relative;
        }
        .nav a:hover{ color: var(--text-dark); padding-left: 28px; }
        /* 激活状态：左侧出现绝对硬朗的几何直角线 */
        .nav a.active{
            color: var(--text-dark);
            font-weight: 700;
            background: var(--bg-canvas);
        }
        .nav a.active::before {
            content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%;
            background: var(--line-solid);
        }

        /* --- 右侧内容区 --- */
        .content{ margin-left: 280px; padding: 100px 80px; min-height: 100vh; }
        
        /* 几何淡入流动动画 */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 180px;
        }
        .reveal.reveal-active { opacity: 1; transform: translateY(0); }

        /* 几何横线与十字标（+）板块主标题 */
        .section-title{
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 70px;
            letter-spacing: 4px;
            display: flex;
            align-items: center;
            gap: 20px;
            text-transform: uppercase;
        }
        .section-title::before {
            content: '+'; /* 工业制图标志性的十字坐标点 */
            font-family: monospace;
            color: var(--text-dark);
        }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--line-solid); }

        /* --- 视频板块结构优化 --- */
        .video-show{ margin-bottom:30px; }
        .video-main{
            width:100%;
            height:540px;
            overflow:hidden;
            margin-bottom:30px;
            background: #000;
            border: 1px solid var(--text-dark); /* 直角刚性黑色边框 */
        }
        .video-main iframe{ width:100%; height:100%; border:none; }
        .video-thumbs{ display: flex; gap: 10px; flex-wrap: wrap; }
        .video-thumb{
            padding: 10px 24px;
            background: var(--bg-sidebar);
            border: 1px solid var(--line-light);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .video-thumb:hover { border-color: var(--text-dark); color: var(--text-dark); }
        .video-thumb.active{ background: var(--text-dark); color: #fff; border-color: var(--text-dark); }

        /* ==========================================================================
           【全新布局重构】平面海报板块：高级包豪斯几何线构风（大间距、图幅自适应）
           ========================================================================== */
        .gallery { 
            column-count: 2;     
            column-gap: 80px;    
        }
        
        .card {
            break-inside: avoid; 
            display: block; 
            width: 100%;
            margin-bottom: 120px; 
            position: relative;
            cursor: pointer;
        }

        /* 核心几何框：为海报垫底的直角测绘虚线框 */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 1px dashed var(--text-dark); /* 几何直角虚线线框 */
            opacity: 0;
            transform: translate(0, 0);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            z-index: 1;
            pointer-events: none;
        }

        .card img {
            width: 100%;
            height: auto;        
            display: block;
            border-radius: 0; /* 彻底直角化，消灭柔和圆角 */
            border: 1px solid var(--line-light); /* 默认极淡结构线定界 */
            
            /* 纯净纸张质感，静止时保持无偏色的工业高级冷灰色调 */
            filter: grayscale(10%) brightness(98%);
            
            position: relative;
            z-index: 2; /* 压在虚线框上方 */
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                        border-color 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                        filter 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 【特效三：几何偏移线框唤醒】 */
        .card:hover::before {
            opacity: 0.8;
            /* 虚线框往右下方几何偏移 12px，勾勒出强烈的平面解构线条感 */
            transform: translate(12px, 12px); 
        }

        .card:hover img {
            transform: translate(-4px, -4px); /* 大图往相反方向（左上方）微漂移，拉开错位感 */
            border-color: var(--text-dark);    /* 边界线瞬间变黑加粗 */
            filter: grayscale(0%) brightness(100%);
        }

        /* --- 磨砂玻璃放大弹窗（硬朗几何直角） --- */
        .img-popup{
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(17, 17, 17, 0.94); /* 极深纯净暗场 */
            backdrop-filter: blur(12px);
            z-index: 99999;
            display: flex; align-items: center; justify-content: center; padding: 40px;
            opacity: 0; visibility: hidden;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: zoom-out;
        }
        .img-popup img{
            max-width: 92%; max-height: 92%; object-fit: contain;
            border-radius: 0; /* 直角 */
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: scale(0.95);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .img-popup.active{ opacity: 1; visibility: visible; }
        .img-popup.active img { transform: scale(1); }

        /* 底栏几何对齐线 */
        .footer{ 
            text-align:center; padding:120px 0 40px; color:var(--text-muted); font-size:11px; letter-spacing: 3px;
            border-top: 1px dashed var(--line-light);
            text-transform: uppercase;
        }

        /* --- 响应式布局 --- */
        @media (max-width:1024px){
            .sidebar{ width: 240px; padding: 40px 20px; }
            .content{ margin-left: 240px; padding: 80px 40px; }
            .gallery { column-gap: 50px; }
        }
        @media (max-width:768px){
            .menu-btn{ display:flex; }
            .sidebar{ transform: translateX(-100%); width: 260px; box-shadow: 15px 0 40px rgba(0,0,0,0.05); }
            .sidebar.show{ transform: translateX(0); }
            .content{ margin-left: 0; padding: 100px 24px 40px; }
            .video-main{ height:260px; }
            .reveal { margin-bottom: 100px; }
            .gallery { column-count: 1; column-gap: 0; }
            .card { margin-bottom: 60px; }
            .card:hover::before { transform: translate(8px, 8px); } /* 手机端微调偏离度 */
        }
    </style>
</head>

<body>

    <!-- 弹窗 -->
    <div class="img-popup" id="imgPopup">
        <img src="" id="bigImg" alt="作品放大预览">
    </div>

    <script>
        // 1. 移动端菜单逻辑
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const navLinks = document.querySelectorAll('.nav a');

        menuBtn.addEventListener('click', (e) => {
            sidebar.classList.toggle('show');
            e.stopPropagation();
        });
        document.addEventListener('click', () => sidebar.classList.remove('show'));
        navLinks.forEach(link => {
            link.addEventListener('click', () => sidebar.classList.remove('show'));
        });

        // 2. 视频流畅切换
        const thumbs = document.querySelectorAll('.video-thumb');
        const mainVideo = document.getElementById('mainVideo');
        thumbs.forEach(thumb => {
            thumb.addEventListener('click', () => {
                thumbs.forEach(t => t.classList.remove('active'));
                thumb.classList.add('active');
                mainVideo.src = thumb.dataset.src;
            });
        });

        // 3. 磨砂玻璃放大弹窗
        const cards = document.querySelectorAll('.card img');
        const popup = document.getElementById('imgPopup');
        const bigImg = document.getElementById('bigImg');

        cards.forEach(img => {
            img.addEventListener('click', (e) => {
                bigImg.src = img.src;
                popup.classList.add('active');
                document.body.style.overflow = 'hidden';
                e.stopPropagation();
            });
        });
        popup.addEventListener('click', () => {
            popup.classList.remove('active');
            document.body.style.overflow = '';
        });

        // 4. 双重智能监听：流体显现动画 + 菜单智能高亮 (Scrollspy)
        const reveals = document.querySelectorAll('.reveal');
        
        const globalObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal-active');
                    
                    const id = entry.target.getAttribute('id');
                    navLinks.forEach(link => {
                        if (link.getAttribute('href') === `#${id}`) {
                            link.classList.add('active');
                        } else {
                            link.classList.remove('active');
                        }
                    });
                }
            });
        }, {
            root: null,
            rootMargin: '-20% 0px -40% 0px',
            threshold: 0.05
        });

        reveals.forEach(el => globalObserver.observe(el));
    </script>
