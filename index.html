<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESIGN WORKS | 李静敏设计集</title>
    <style>
        /* --- 基础重置与包豪斯几何变量 --- */
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;}

        :root {
            --bg-canvas: #F4F4F1;     /* 艺术卡纸冷白 / 经典包豪斯底色 */
            --bg-sidebar: #FFFFFF;    /* 纯白结构面板 */
            --text-dark: #111111;     /* 曜石硬核黑 */
            --text-muted: #7A7E82;    /* 工业测绘灰 */
            --line-grid: rgba(17, 17, 17, 0.04);  /* 全屏精密底网格线 */
            --line-solid: #111111;    /* 结构实体线 */
            --line-light: #D5D8DC;    /* 测绘辅助线 */
        }

        body{
            background: var(--bg-canvas);
            /* 【线构强化：建筑蓝图式双重交错网格底】 */
            background-image: 
                linear-gradient(to right, var(--line-grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--line-grid) 1px, transparent 1px);
            background-size: 60px 60px; 
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", sans-serif;
            color: var(--text-dark);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* --- 移动端汉堡按钮（纯刚性几何线条） --- */
        .menu-btn{
            position: fixed;
            top: 25px;
            right: 25px;
            width: 44px;
            height: 44px;
            background: var(--bg-sidebar);
            border: 1px solid var(--text-dark);
            border-radius: 0; 
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: var(--text-dark);
            z-index: 9999;
            cursor: pointer;
        }
        .menu-btn:hover { background: var(--text-dark); color: #fff; }

        /* --- 左侧直角侧边栏 --- */
        .sidebar{
            position: fixed;
            top: 0; left: 0; width: 280px; height: 100vh;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--line-light);
            padding: 80px 40px;
            z-index: 999;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        /* 侧边栏双轨辅助线 */
        .sidebar::after {
            content: ''; position: absolute; top: 0; right: 6px; width: 1px; height: 100%;
            background: var(--line-grid);
        }
        .sidebar .logo{
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: 6px;
            margin-bottom: 80px;
            text-align: center;
            text-transform: uppercase;
        }
        .nav{ display: flex; flex-direction: column; gap: 4px; }
        .nav a{
            padding: 14px 20px;
            text-decoration: none;
            color: var(--text-muted);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 13px;
            text-align: left;
            letter-spacing: 3px;
            font-weight: 500;
            position: relative;
        }
        .nav a:hover{ color: var(--text-dark); padding-left: 26px; }
        .nav a.active{ color: var(--text-dark); font-weight: 700; background: var(--bg-canvas); }
        .nav a.active::before {
            content: ''; position: absolute; left: 0; top: 0; width: 2px; height: 100%;
            background: var(--line-solid);
        }

        /* --- 右侧内容区 --- */
        .content{ margin-left: 280px; padding: 100px 60px; min-height: 100vh; }
        
        /* 几何段落过渡 */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 120px; /* 紧凑间距 */
        }
        .reveal.reveal-active { opacity: 1; transform: translateY(0); }

        /* 测绘仪器十字线分割标题 */
        .section-title{
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 45px;
            letter-spacing: 4px;
            display: flex;
            align-items: center;
            gap: 20px;
            text-transform: uppercase;
        }
        .section-title::before { content: '└┘'; font-family: monospace; font-size: 12px; color: var(--text-dark); }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--line-solid); }

        /* --- 视频板块 --- */
        .video-show{ margin-bottom:30px; }
        .video-main{
            width:100%;
            height:500px;
            overflow:hidden;
            margin-bottom:25px;
            background: #000;
            border: 1px solid var(--text-dark);
        }
        .video-main iframe{ width:100%; height:100%; border:none; }
        .video-thumbs{ display: flex; gap: 8px; flex-wrap: wrap; }
        .video-thumb{
            padding: 10px 24px;
            background: var(--bg-sidebar);
            border: 1px solid var(--line-light);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .video-thumb:hover { border-color: var(--text-dark); color: var(--text-dark); }
        .video-thumb.active{ background: var(--text-dark); color: #fff; border-color: var(--text-dark); }


        /* ==========================================================================
           【重构核心】工业级测绘索引矩阵：一行 4 个 ＋ 多重虚线发光框线
           ========================================================================== */
        
        /* 图纸刻度筛选导轨 */
        .filter-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 35px;
            border-top: 1px solid var(--text-dark);
            border-bottom: 1px dashed var(--line-light);
            padding: 15px 0;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: transparent;
            border: 1px dashed var(--line-light);
            padding: 8px 22px;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .filter-btn:hover { border-color: var(--text-dark); color: var(--text-dark); }
        .filter-btn.active {
            background: var(--text-dark);
            color: #FFFFFF;
            border-color: var(--text-dark);
        }

        /* 升级为极致紧凑的 4 列直角网格（一行4个），彻底斩断多余拉伸 */
        .gallery { 
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 28px; /* 精密而克制的网格缝隙 */
        }
        
        .card {
            display: block; 
            width: 100%;
            aspect-ratio: 3 / 4;   /* 强制锁定完美对齐的工程标准画幅视窗 */
            background: #FFFFFF;   /* 纯净底层图纸白 */
            border: 1px solid var(--line-light); 
            padding: 12px;         /* 四边内缩，图片居中悬浮 */
            position: relative;
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .card.hide { display: none; }

        /* 【多线条特效：四个角落的交叉十字制图线】 */
        .card::before, .card::after {
            content: ''; position: absolute; width: 10px; height: 10px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0.4; pointer-events: none;
        }
        /* 左上角与右下角十字线 */
        .card::before {
            top: -4px; left: -4px;
            border-top: 1px solid var(--text-dark); border-left: 1px solid var(--text-dark);
        }
        /* 右上角与左下角十字线 */
        .card::after {
            bottom: -4px; right: -4px;
            border-bottom: 1px solid var(--text-dark); border-right: 1px solid var(--text-dark);
        }

        /* 海报本体容器 */
        .card-inner {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 核心：严格完整显示海报，绝不切边裁剪 */
            filter: grayscale(8%) contrast(98%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), filter 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 【多线条悬停动态强化：错位双图层图纸特效】 */
        .card:hover {
            border-color: var(--text-dark);
            transform: scale(1.02); /* 直角框向外轻微扩张 */
        }
        /* 角落测绘十字线向外崩拉拉伸 */
        .card:hover::before { top: -8px; left: -8px; opacity: 1; }
        .card:hover::after { bottom: -8px; right: -8px; opacity: 1; }

        .card:hover img {
            transform: scale(1.04); /* 海报在方框内纯粹前推 */
            filter: grayscale(0%) contrast(100%);
        }

        /* --- 磨砂玻璃放大弹窗 --- */
        .img-popup{
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(17, 17, 17, 0.93); 
            backdrop-filter: blur(12px);
            z-index: 99999;
            display: flex; align-items: center; justify-content: center; padding: 40px;
            opacity: 0; visibility: hidden;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: zoom-out;
        }
        .img-popup img{
            max-width: 92%; max-height: 92%; object-fit: contain;
            border-radius: 0; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: scale(0.95);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .img-popup.active{ opacity: 1; visibility: visible; }
        .img-popup.active img { transform: scale(1); }

        /* 底栏标尺线 */
        .footer{ 
            text-align:center; padding:100px 0 40px; color:var(--text-muted); font-size:11px; letter-spacing: 3px;
            border-top: 1px dashed var(--line-solid);
            text-transform: uppercase;
        }

        /* --- 响应式矩阵平滑缩减 --- */
        @media (max-width:1400px){
            .gallery { grid-template-columns: repeat(3, 1fr); } /* 缩到中屏幕自动降为 3 列 */
        }
        @media (max-width:1024px){
            .sidebar{ width: 240px; padding: 40px 20px; }
            .content{ margin-left: 240px; padding: 80px 30px; }
            .gallery { grid-template-columns: repeat(2, 1fr); gap: 20px; } /* 平板 2 列 */
        }
        @media (max-width:768px){
            .menu-btn{ display:flex; }
            .sidebar{ transform: translateX(-100%); width: 260px; box-shadow: 15px 0 40px rgba(0,0,0,0.05); }
            .sidebar.show{ transform: translateX(0); }
            .content{ margin-left: 0; padding: 100px 20px 40px; }
            .video-main{ height:260px; }
            .reveal { margin-bottom: 80px; }
            .gallery { grid-template-columns: 1fr; gap: 24px; } /* 手机端极致单列 */
        }
    </style>
</head>

    <script>
        // 1. 移动端菜单逻辑
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const navLinks = document.querySelectorAll('.nav a');

        menuBtn.addEventListener('click', (e) => {
            sidebar.classList.toggle('show');
            e.stopPropagation();
        });
        document.addEventListener('click', () => sidebar.classList.remove('show'));
        navLinks.forEach(link => {
            link.addEventListener('click', () => sidebar.classList.remove('show'));
        });

        // 2. 视频流畅切换
        const thumbs = document.querySelectorAll('.video-thumb');
        const mainVideo = document.getElementById('mainVideo');
        thumbs.forEach(thumb => {
            thumb.addEventListener('click', () => {
                thumbs.forEach(t => t.classList.remove('active'));
                thumb.classList.add('active');
                mainVideo.src = thumb.dataset.src;
            });
        });

        // 3. 磨砂玻璃放大弹窗
        const popup = document.getElementById('imgPopup');
        const bigImg = document.getElementById('bigImg');
        
        // 兼容嵌套后的 card-inner 结构点击
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', (e) => {
                const img = card.querySelector('img');
                if(img) {
                    bigImg.src = img.src;
                    popup.classList.add('active');
                    document.body.style.overflow = 'hidden';
                    e.stopPropagation();
                }
            });
        });
        popup.addEventListener('click', () => {
            popup.classList.remove('active');
            document.body.style.overflow = '';
        });

        // 4. 海报分组无刷新切换 (Instant Filtering)
        const filterBtns = document.querySelectorAll('.filter-btn');
        const galleryCards = document.querySelectorAll('#galleryGrid .card');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const target = btn.dataset.target;

                galleryCards.forEach(card => {
                    if (target === 'all' || card.dataset.cat === target) {
                        card.classList.remove('hide');
                    } else {
                        card.classList.add('hide');
                    }
                });
            });
        });

        // 5. 双重智能监听：流体显显动画 + 菜单智能高亮 (Scrollspy)
        const reveals = document.querySelectorAll('.reveal');
        
        const globalObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal-active');
                    
                    const id = entry.target.getAttribute('id');
                    navLinks.forEach(link => {
                        if (link.getAttribute('href') === `#${id}`) {
                            link.classList.add('active');
                        } else {
                            link.classList.remove('active');
                        }
                    });
                }
            });
        }, {
            root: null,
            rootMargin: '-20% 0px -40% 0px',
            threshold: 0.05
        });

        reveals.forEach(el => globalObserver.observe(el));
    </script>
</body>
</html>
