<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESIGN WORKS | 李静敏设计集</title>
    <style>
        /* --- 基础重置与赛博光流变量 --- */
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;}

        :root {
            --bg-void: #09090B;        /* 极深黑曜石空间 */
            --bg-sidebar: #121216;     /* 暗黑结构面板 */
            --neon-cyan: #00F0FF;      /* 核心：高亮电光青 */
            --neon-green: #00FF88;     /* 核心：高亮荧光绿 */
            --text-bright: #FFFFFF;    /* 纯净激光白 */
            --text-muted: #64748B;     /* 暗调矿物灰 */
            --line-grid: rgba(0, 240, 255, 0.025); /* 极弱的动态霓虹网格线 */
            --line-solid: #00F0FF;     /* 实体激光线 */
        }

        body{
            background: var(--bg-void);
            /* 【动态特效一：无限流动的数字几何网格】 */
            background-image: 
                linear-gradient(to right, var(--line-grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--line-grid) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridScan 40s linear infinite; /* 网格极其平缓地无限飘移滚动 */
            
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", sans-serif;
            color: var(--text-bright);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        @keyframes gridScan {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        /* --- 移动端直角直出汉堡按钮 --- */
        .menu-btn{
            position: fixed;
            top: 25px;
            right: 25px;
            width: 44px;
            height: 44px;
            background: var(--bg-sidebar);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
            border-radius: 0; 
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--neon-cyan);
            z-index: 9999;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .menu-btn:hover { background: var(--neon-cyan); color: var(--bg-void); box-shadow: 0 0 20px var(--neon-cyan); }

        /* --- 左侧悬浮指挥舱侧边栏 --- */
        .sidebar{
            position: fixed;
            top: 0; left: 0; width: 280px; height: 100vh;
            background: var(--bg-sidebar);
            border-right: 1px solid rgba(0, 240, 255, 0.15);
            padding: 80px 40px;
            z-index: 999;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        /* 侧边栏边缘流光线条 */
        .sidebar::after {
            content: ''; position: absolute; top: 0; right: -1px; width: 1px; height: 100%;
            background: linear-gradient(to bottom, transparent, var(--neon-cyan), transparent);
        }
        .sidebar .logo{
            font-size: 16px;
            font-weight: 800;
            color: var(--text-bright);
            letter-spacing: 5px;
            margin-bottom: 80px;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .nav{ display: flex; flex-direction: column; gap: 6px; }
        .nav a{
            padding: 14px 20px;
            text-decoration: none;
            color: var(--text-muted);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 13px;
            text-align: left;
            letter-spacing: 3px;
            font-weight: 600;
            position: relative;
        }
        .nav a:hover{ color: var(--neon-cyan); padding-left: 28px; text-shadow: 0 0 8px var(--neon-cyan); }
        
        /* 激活标签：自带强烈的电光发光块 */
        .nav a.active{
            color: var(--bg-void);
            font-weight: 700;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-green));
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        /* --- 右侧内容核心区 --- */
        .content{ margin-left: 280px; padding: 100px 80px; min-height: 100vh; }
        
        /* 流体渐显显现动画 */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 140px;
        }
        .reveal.reveal-active { opacity: 1; transform: translateY(0); }

        /* 【发光线条特性二：霓虹标题分割线】 */
        .section-title{
            font-size: 16px;
            font-weight: 800;
            color: var(--text-bright);
            margin-bottom: 50px;
            letter-spacing: 4px;
            display: flex;
            align-items: center;
            gap: 20px;
            text-transform: uppercase;
            text-shadow: 0 0 12px var(--line-solid); /* 字体霓虹发光 */
        }
        .section-title::before { content: '■'; font-size: 11px; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .section-title::after { 
            content: ''; flex: 1; height: 1px; 
            background: linear-gradient(90deg, var(--line-solid), transparent); 
            box-shadow: 0 0 8px var(--line-solid); /* 纯CSS线条炫酷发光 */
        }

        /* --- 动态视频板块 --- */
        .video-show{ margin-bottom:30px; }
        .video-main{
            width:100%;
            height:540px;
            overflow:hidden;
            margin-bottom:30px;
            background: #000;
            border: 1px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.05);
            position: relative;
        }
        .video-main iframe{ width:100%; height:100%; border:none; }
        .video-thumbs{ display: flex; gap: 12px; flex-wrap: wrap; }
        .video-thumb{
            padding: 12px 28px;
            background: var(--bg-sidebar);
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .video-thumb:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); text-shadow: 0 0 5px var(--neon-cyan); }
        .video-thumb.active{ 
            background: var(--bg-void); 
            color: var(--neon-green); 
            border-color: var(--neon-green); 
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); 
        }

        /* ==========================================================================
           【全新改版】数码光流三列海报流（高效、霓虹发光、硬件加速丝滑动画）
           ========================================================================== */
        
        /* 几何分类器标签 */
        .filter-menu {
            display: flex;
            gap: 12px;
            margin-bottom: 45px;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: var(--bg-sidebar);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 10px 26px;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .filter-btn:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }
        .filter-btn.active {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-green));
            color: var(--bg-void);
            border-color: transparent;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        /* 三列高能量网格 */
        .gallery { 
            column-count: 3;     
            column-gap: 35px;    
        }
        
        .card {
            break-inside: avoid; 
            display: inline-block; 
            width: 100%;
            margin-bottom: 45px;   
            position: relative;
            cursor: pointer;
            will-change: transform; /* 启用GPU硬件加速，保障光效动画绝对不卡顿 */
        }
        
        .card.hide { display: none; }

        /* 【特效四：高亮霓虹虚线背影线框】 */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 1px dashed var(--neon-cyan); 
            opacity: 0;
            transform: translate(0, 0);
            /* 丝滑的缓动曲线，让虚线框弹出时带有物理弹簧感 */
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), 
                        box-shadow 0.6s cubic-bezier(0.16, 1, 0.3, 1), 
                        opacity 0.4s ease;
            z-index: 1;
            pointer-events: none;
        }

        .card img {
            width: 100%;
            height: auto;        
            display: block;
            border-radius: 0; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            
            /* 静止状态下冷感微灰度 */
            filter: grayscale(15%) brightness(90%);
            position: relative;
            z-index: 2; 
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                        border-color 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                        filter 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 悬停唤醒：线框喷射发光、大图逆向漂移 */
        .card:hover::before {
            opacity: 1;
            transform: translate(14px, 14px); 
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5); /* 虚线框霓虹爆裂发光 */
        }

        .card:hover img {
            transform: translate(-4px, -4px); 
            border-color: var(--neon-green); /* 图片边界激活为亮绿色 */
            filter: grayscale(0%) brightness(105%);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.25);
        }

        /* --- 极光模糊全屏放大弹窗 --- */
        .img-popup{
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 6, 0.96); 
            backdrop-filter: blur(15px);
            z-index: 99999;
            display: flex; align-items: center; justify-content: center; padding: 40px;
            opacity: 0; visibility: hidden;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: zoom-out;
        }
        .img-popup img{
            max-width: 92%; max-height: 92%; object-fit: contain;
            border-radius: 0; 
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.3);
            transform: scale(0.95);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .img-popup.active{ opacity: 1; visibility: visible; }
        .img-popup.active img { transform: scale(1); }

        /* 底栏 */
        .footer{ 
            text-align:center; padding:120px 0 40px; color:var(--text-muted); font-size:11px; letter-spacing: 3px;
            border-top: 1px dashed rgba(0, 240, 255, 0.15);
            text-transform: uppercase;
        }

        /* --- 响应式布局 --- */
        @media (max-width:1200px){
            .gallery { column-count: 2; column-gap: 30px; }
        }
        @media (max-width:1024px){
            .sidebar{ width: 240px; padding: 40px 20px; }
            .content{ margin-left: 240px; padding: 80px 40px; }
        }
        @media (max-width:768px){
            .menu-btn{ display:flex; }
            .sidebar{ transform: translateX(-100%); width: 260px; background: rgba(18, 18, 22, 0.98); backdrop-filter: blur(10px); }
            .sidebar.show{ transform: translateX(0); }
            .content{ margin-left: 0; padding: 100px 24px 40px; }
            .video-main{ height:260px; }
            .reveal { margin-bottom: 100px; }
            .gallery { column-count: 1; column-gap: 0; }
            .card { margin-bottom: 35px; }
            .card:hover::before { transform: translate(8px, 8px); } 
        }
    </style>
</head>

    <!-- 弹窗 -->

        <img src="" id="bigImg" alt="作品放大预览">

    <script>
        // 1. 移动端菜单逻辑
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const navLinks = document.querySelectorAll('.nav a');

        menuBtn.addEventListener('click', (e) => {
            sidebar.classList.toggle('show');
            e.stopPropagation();
        });
        document.addEventListener('click', () => sidebar.classList.remove('show'));
        navLinks.forEach(link => {
            link.addEventListener('click', () => sidebar.classList.remove('show'));
        });

        // 2. 视频流畅切换
        const thumbs = document.querySelectorAll('.video-thumb');
        const mainVideo = document.getElementById('mainVideo');
        thumbs.forEach(thumb => {
            thumb.addEventListener('click', () => {
                thumbs.forEach(t => t.classList.remove('active'));
                thumb.classList.add('active');
                mainVideo.src = thumb.dataset.src;
            });
        });

        // 3. 磨砂玻璃放大弹窗
        const cards = document.querySelectorAll('.card img');
        const popup = document.getElementById('imgPopup');
        const bigImg = document.getElementById('bigImg');

        cards.forEach(img => {
            img.addEventListener('click', (e) => {
                bigImg.src = img.src;
                popup.classList.add('active');
                document.body.style.overflow = 'hidden';
                e.stopPropagation();
            });
        });
        popup.addEventListener('click', () => {
            popup.classList.remove('active');
            document.body.style.overflow = '';
        });

        // 4. 海报分组无刷新切换 (Instant Filtering)
        const filterBtns = document.querySelectorAll('.filter-btn');
        const galleryCards = document.querySelectorAll('#galleryGrid .card');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const target = btn.dataset.target;

                galleryCards.forEach(card => {
                    if (target === 'all' || card.dataset.cat === target) {
                        card.classList.remove('hide');
                    } else {
                        card.classList.add('hide');
                    }
                });
            });
        });

        // 5. 双重智能监听：流体显现动画 + 菜单智能高亮 (Scrollspy)
        const reveals = document.querySelectorAll('.reveal');
        
        const globalObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal-active');
                    
                    const id = entry.target.getAttribute('id');
                    navLinks.forEach(link => {
                        if (link.getAttribute('href') === `#${id}`) {
                            link.classList.add('active');
                        } else {
                            link.classList.remove('active');
                        }
                    });
                }
            });
        }, {
            root: null,
            rootMargin: '-20% 0px -40% 0px',
            threshold: 0.05
        });

        reveals.forEach(el => globalObserver.observe(el));
    </script>
</body>
</html>
